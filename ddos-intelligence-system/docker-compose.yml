version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_WS_URL=ws://localhost:8000/ws/attacks
    ports:
      - "5173:80"
    depends_on:
      - backend
