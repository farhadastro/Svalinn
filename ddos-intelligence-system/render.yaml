services:
  # Frontend Static Site
  - type: web
    name: hyperddos-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # US Instance (Primary for Americas & Asia)
  - type: web
    name: hyperddos-backend-us
    env: docker
    region: oregon 
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: REGION
        value: US_WEST

  # EU Instance (Primary for Europe & Africa)
  - type: web
    name: hyperddos-backend-eu
    env: docker
    region: frankfurt
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: REGION
        value: EU_CENTRAL
