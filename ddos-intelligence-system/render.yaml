services:
  # US Instance (Primary for Americas & Asia)
  - type: web
    name: ddos-backend-us
    env: docker
    region: oregon 
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: REGION
        value: US_WEST

  # EU Instance (Primary for Europe & Africa)
  - type: web
    name: ddos-backend-eu
    env: docker
    region: frankfurt
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: REGION
        value: EU_CENTRAL

