name: Deploy to Vercel and Render

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Build and Deploy to Vercel
        working-directory: ./frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          npx vercel build --prod --token=$VERCEL_TOKEN
          npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  deploy-backend:
    name: Trigger Render Deployments
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Basic Syntax Validation
        working-directory: ./backend
        run: |
          python -m py_compile $(find . -name "*.py")
          
      - name: Trigger Render US Branch
        if: success()
        env:
          RENDER_DEPLOY_HOOK_US: ${{ secrets.RENDER_DEPLOY_HOOK_US }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_US" ]; then
            curl -s -X POST "$RENDER_DEPLOY_HOOK_US"
            echo "Triggered US deployment on Render"
          else
            echo "RENDER_DEPLOY_HOOK_US secret is not set!"
            exit 1
          fi

      - name: Trigger Render EU Branch
        if: success()
        env:
          RENDER_DEPLOY_HOOK_EU: ${{ secrets.RENDER_DEPLOY_HOOK_EU }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_EU" ]; then
            curl -s -X POST "$RENDER_DEPLOY_HOOK_EU"
            echo "Triggered EU deployment on Render"
          else
            echo "RENDER_DEPLOY_HOOK_EU secret is not set!"
            exit 1
          fi
